<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Merge Sort com Painel de Status</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 30px;
        }

        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            width: 100%;
            max-width: 900px;
            border-bottom: 2px solid #333;
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .bar {
            width: 8px;
            margin: 0 1px;
            background-color: #333; /* Cor base (não processado) */
            border-radius: 2px 2px 0 0;
        }

        /* Cores de status das barras */
        .active-range { background-color: #ffeb3b !important; } /* Amarelo: O bloco atual que está sofrendo o "merge" */
        .merging { background-color: #f44336 !important; }        /* Vermelho: A barra específica sendo sobrescrita agora */
        .sorted { background-color: #00c853 !important; }         /* Verde escuro: Totalmente ordenado no final */

        /* Painel de Estatísticas */
        .stats-panel {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 15px 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-panel div {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-title {
            color: #aaa;
            font-size: 14px;
        }

        .stats-value {
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
        }

        /* Controles Inferiores */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .slider-value-box {
            background-color: #1e1e1e;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            min-width: 30px;
            text-align: center;
        }

        input[type=range] {
            accent-color: #fff;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 20px;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #3a3a3a;
        }

        button:disabled {
            color: #666;
            cursor: not-allowed;
            border-color: #333;
        }
        
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <div class="stats-panel">
        <div>
            <span class="stats-title">Status</span>
            <span class="stats-value" id="statusText">Aguardando</span>
        </div>
        <div>
            <span class="stats-title">Comparações</span>
            <span class="stats-value" id="compText">0</span>
        </div>
    </div>

    <div class="controls">
        <div class="slider-group">
            <label for="speedSlider">Velocidade (ms)</label>
            <input type="range" id="speedSlider" min="1" max="100" value="15">
            <div class="slider-value-box" id="speedDisplay">15</div>
        </div>
        
        <button onclick="gerarArray()" id="btnGerar">Gerar Novas Barras</button>
        <button onclick="iniciarSort()" id="btnOrdenar" class="btn-primary">Iniciar Ordenação</button>
    </div>

    <script>
        const container = document.getElementById("container");
        const statusText = document.getElementById("statusText");
        const compText = document.getElementById("compText");
        const speedSlider = document.getElementById("speedSlider");
        const speedDisplay = document.getElementById("speedDisplay");
        const btnGerar = document.getElementById("btnGerar");
        const btnOrdenar = document.getElementById("btnOrdenar");

        let array = [];
        let numComparacoes = 0;

        speedSlider.addEventListener("input", function() {
            speedDisplay.innerText = this.value;
        });

        function getDelay() {
            return parseInt(speedSlider.value);
        }

        function gerarArray() {
            array = [];
            numComparacoes = 0;
            compText.innerText = "0";
            statusText.innerText = "Aguardando";
            statusText.style.color = "#ffffff";
            
            for (let i = 1; i <= 100; i++) {
                array.push(i);
            }
            
            // Embaralha o array aleatoriamente
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            
            desenharBarras();
            btnOrdenar.disabled = false;
        }

        function desenharBarras() {
            container.innerHTML = "";
            array.forEach(valor => {
                const bar = document.createElement("div");
                bar.classList.add("bar");
                bar.style.height = `${valor * 2.8}px`; 
                container.appendChild(bar);
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function iniciarSort() {
            btnGerar.disabled = true;
            btnOrdenar.disabled = true;
            statusText.innerText = "Ordenando...";
            statusText.style.color = "#ffeb3b"; 
            
            const barras = document.getElementsByClassName("bar");
            
            await mergeSort(array, 0, array.length - 1, barras);
            
            // Finalização: Pinta tudo de verde suavemente
            for(let i = 0; i < barras.length; i++){
                barras[i].classList.remove("active-range", "merging");
                barras[i].classList.add("sorted");
                await sleep(2); // Efeito visual rápido no final
            }
            
            statusText.innerText = "Concluído";
            statusText.style.color = "#00e676";
            btnGerar.disabled = false;
        }

        // Dividir: Função recursiva do Merge Sort
        async function mergeSort(arr, inicio, fim, barras) {
            if (inicio >= fim) {
                return;
            }

            const meio = Math.floor((inicio + fim) / 2);

            // Chama para a metade esquerda
            await mergeSort(arr, inicio, meio, barras);
            // Chama para a metade direita
            await mergeSort(arr, meio + 1, fim, barras);
            
            // Conquistar: Faz o merge (mistura)
            await merge(arr, inicio, meio, fim, barras);
        }

        // Misturar: Junta duas metades ordenadas
        async function merge(arr, inicio, meio, fim, barras) {
            let n1 = meio - inicio + 1;
            let n2 = fim - meio;
            
            let esquerda = new Array(n1);
            let direita = new Array(n2);

            for (let i = 0; i < n1; i++) esquerda[i] = arr[inicio + i];
            for (let j = 0; j < n2; j++) direita[j] = arr[meio + 1 + j];

            let i = 0; 
            let j = 0; 
            let k = inicio; 

            // Pinta o intervalo atual de amarelo para sabermos onde está ocorrendo a mistura
            for (let x = inicio; x <= fim; x++) {
                barras[x].classList.add("active-range");
            }

            while (i < n1 && j < n2) {
                // Registra a comparação entre o elemento da esquerda e da direita
                numComparacoes++;
                compText.innerText = numComparacoes;
                
                barras[k].classList.add("merging"); // Destaca em vermelho a barra sendo alterada
                await sleep(getDelay());

                if (esquerda[i] <= direita[j]) {
                    arr[k] = esquerda[i];
                    i++;
                } else {
                    arr[k] = direita[j];
                    j++;
                }
                
                // Atualiza a altura visualmente
                barras[k].style.height = `${arr[k] * 2.8}px`;
                
                barras[k].classList.remove("merging");
                k++;
            }

            // Copia os elementos que sobraram na metade esquerda
            while (i < n1) {
                barras[k].classList.add("merging");
                await sleep(getDelay());
                
                arr[k] = esquerda[i];
                barras[k].style.height = `${arr[k] * 2.8}px`;
                
                barras[k].classList.remove("merging");
                i++;
                k++;
            }

            // Copia os elementos que sobraram na metade direita
            while (j < n2) {
                barras[k].classList.add("merging");
                await sleep(getDelay());

                arr[k] = direita[j];
                barras[k].style.height = `${arr[k] * 2.8}px`;

                barras[k].classList.remove("merging");
                j++;
                k++;
            }

            // Limpa o fundo amarelo após finalizar o merge desse intervalo
            for (let x = inicio; x <= fim; x++) {
                barras[x].classList.remove("active-range");
            }
        }

        gerarArray();
    </script>
</body>
</html>
