<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualização Quick Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0 5px;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #container {
            display: flex;
            align-items: flex-end; /* Alinha as barras na parte inferior */
            justify-content: center;
            height: 400px;
            width: 90%;
            border-bottom: 2px solid #555;
            padding: 0 10px;
        }

        .bar {
            width: 8px; /* Largura da barra */
            margin: 0 1px;
            background-color: cyan;
            transition: height 0.1s; /* Suaviza a mudança de tamanho */
        }

        /* Cores para os estados da ordenação */
        .pivot { background-color: red !important; }      /* O elemento comparador */
        .active { background-color: yellow !important; }  /* O elemento sendo analisado */
        .sorted { background-color: limegreen !important; } /* Já finalizado */
    </style>
</head>
<body>

    <h1>Visualização Quick Sort</h1>
    
    <div class="controls">
        <button onclick="gerarArray()">Gerar Novas Barras</button>
        <button onclick="iniciarSort()" id="btnOrdenar">Iniciar Ordenação</button>
    </div>

    <div id="container"></div>

    <script>
        const container = document.getElementById("container");
        const btnOrdenar = document.getElementById("btnOrdenar");
        let array = [];
        const delayMs = 15; // Velocidade da animação (menor = mais rápido)

        // 1. Gera 100 barras de tamanhos distintos (1 a 100)
        function gerarArray() {
            array = [];
            // Cria array ordenado de 1 a 100
            for (let i = 1; i <= 100; i++) {
                array.push(i);
            }
            // Embaralha (Shuffle)
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            desenharBarras();
            btnOrdenar.disabled = false;
        }

        // Cria os elementos visuais no HTML
        function desenharBarras() {
            container.innerHTML = "";
            array.forEach(valor => {
                const bar = document.createElement("div");
                bar.classList.add("bar");
                // Altura baseada em porcentagem ou pixels (multiplicamos por 3.5 para ficar visível)
                bar.style.height = `${valor * 3.5}px`; 
                container.appendChild(bar);
            });
        }

        // Função de pausa para criarmos a animação
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Função wrapper para iniciar o processo
        async function iniciarSort() {
            btnOrdenar.disabled = true; // Evita cliques múltiplos
            const barras = document.getElementsByClassName("bar");
            await quickSort(array, 0, array.length - 1, barras);
            
            // Marca tudo como verde no final
            for(let i=0; i < barras.length; i++){
                barras[i].classList.add("sorted");
                await sleep(5);
            }
            btnOrdenar.disabled = false;
        }

        // Lógica do Quick Sort com visualização
        async function quickSort(arr, inicio, fim, barras) {
            if (inicio < fim) {
                // Obtém o índice de partição
                let pi = await partition(arr, inicio, fim, barras);

                // Ordena recursivamente os elementos antes e depois da partição
                await quickSort(arr, inicio, pi - 1, barras);
                await quickSort(arr, pi + 1, fim, barras);
            }
        }

        async function partition(arr, inicio, fim, barras) {
            // Escolhemos o último elemento como PIVÔ
            let pivotValue = arr[fim];
            barras[fim].classList.add("pivot"); // Visual: Vermelho

            let i = inicio - 1; // Índice do menor elemento

            for (let j = inicio; j < fim; j++) {
                barras[j].classList.add("active"); // Visual: Amarelo (sendo analisado)
                await sleep(delayMs);

                // Se o elemento atual é menor que o pivô
                if (arr[j] < pivotValue) {
                    i++;
                    
                    // Troca os dados no array
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    
                    // Troca a altura visualmente
                    barras[i].style.height = `${arr[i] * 3.5}px`;
                    barras[j].style.height = `${arr[j] * 3.5}px`;
                }
                barras[j].classList.remove("active");
            }

            // Troca o pivô para a posição correta (i + 1)
            [arr[i + 1], arr[fim]] = [arr[fim], arr[i + 1]];
            
            barras[i + 1].style.height = `${arr[i + 1] * 3.5}px`;
            barras[fim].style.height = `${arr[fim] * 3.5}px`;

            barras[fim].classList.remove("pivot"); // Remove cor do pivô antigo
            barras[i+1].classList.add("sorted"); // Visual: Verde (pivô está no lugar final dele)
            
            return i + 1;
        }

        // Inicia ao carregar
        gerarArray();

    </script>
</body>
</html>
