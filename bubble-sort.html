<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualização Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; }
        p { color: #aaa; margin-bottom: 20px; }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ff5722; /* Cor laranja para diferenciar */
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0 5px;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 400px;
            width: 90%;
            border-bottom: 2px solid #555;
            padding: 0 10px;
        }

        .bar {
            width: 8px;
            margin: 0 1px;
            background-color: cyan;
        }

        /* Estados visuais */
        .comparing { background-color: yellow !important; } /* Comparando vizinhos */
        .swapping { background-color: red !important; }     /* Trocando de lugar */
        .sorted { background-color: limegreen !important; } /* Já finalizado */
    </style>
</head>
<body>

    <h1>Visualização Bubble Sort</h1>
    <p>Observe como a barra maior "viaja" até a ponta direita a cada ciclo.</p>
    
    <div class="controls">
        <button onclick="gerarArray()">Gerar Novas Barras</button>
        <button onclick="iniciarSort()" id="btnOrdenar">Iniciar Bubble Sort</button>
    </div>

    <div id="container"></div>

    <script>
        const container = document.getElementById("container");
        const btnOrdenar = document.getElementById("btnOrdenar");
        let array = [];
        // Delay muito baixo porque o Bubble Sort faz MUITAS comparações
        const delayMs = 1; 

        function gerarArray() {
            array = [];
            for (let i = 1; i <= 100; i++) {
                array.push(i);
            }
            // Shuffle
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            desenharBarras();
            btnOrdenar.disabled = false;
        }

        function desenharBarras() {
            container.innerHTML = "";
            array.forEach(valor => {
                const bar = document.createElement("div");
                bar.classList.add("bar");
                bar.style.height = `${valor * 3.5}px`; 
                container.appendChild(bar);
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function iniciarSort() {
            btnOrdenar.disabled = true;
            const barras = document.getElementsByClassName("bar");
            await bubbleSort(array, barras);
            btnOrdenar.disabled = false;
        }

        // Lógica do Bubble Sort
        async function bubbleSort(arr, barras) {
            const n = arr.length;
            
            for (let i = 0; i < n - 1; i++) {
                
                // Os últimos 'i' elementos já estão ordenados, então não precisamos ir até o fim
                for (let j = 0; j < n - i - 1; j++) {
                    
                    // Pinta de amarelo os dois que estão sendo comparados
                    barras[j].classList.add("comparing");
                    barras[j + 1].classList.add("comparing");

                    // Pausa para visualização
                    await sleep(delayMs);

                    if (arr[j] > arr[j + 1]) {
                        // Se precisarem trocar, pinta de vermelho rapidinho
                        barras[j].classList.remove("comparing");
                        barras[j + 1].classList.remove("comparing");
                        barras[j].classList.add("swapping");
                        barras[j + 1].classList.add("swapping");

                        // Troca no array de dados
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];

                        // Troca visual (altura)
                        barras[j].style.height = `${arr[j] * 3.5}px`;
                        barras[j + 1].style.height = `${arr[j + 1] * 3.5}px`;
                        
                        // Espera um pouquinho para ver o vermelho
                        await sleep(delayMs);

                        barras[j].classList.remove("swapping");
                        barras[j + 1].classList.remove("swapping");
                    } else {
                        // Apenas remove o amarelo se não houve troca
                        barras[j].classList.remove("comparing");
                        barras[j + 1].classList.remove("comparing");
                    }
                }
                
                // O elemento na posição (n - i - 1) agora é certamente o maior restante
                // Então ele fica verde (ordenado)
                barras[n - i - 1].classList.add("sorted");
            }
            // O loop principal para antes do primeiro elemento (índice 0), 
            // então pintamos ele de verde no final
            barras[0].classList.add("sorted");
        }

        gerarArray();
    </script>
</body>
</html>
